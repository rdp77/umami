# Umami Workflow Fix Dropdown Ui

## Action

Follow the fix-dropdown-ui workflow:
1. Edit one or more dropdown-related component files (e.g., WebsiteSelect.tsx, BoardSelect.tsx, etc.).
2. Adjust properties like maxHeight or pageSize.
3. Test the dropdown in the UI.
4. Commit the changes, often touching multiple dropdown components at once.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: src/components/input/*Select.tsx, src/app/(main)/settings/preferences/*.tsx, src/app/(main)/websites/[websiteId]/*/*.tsx

