# Umami Workflow Dependency Update

## Action

Follow the dependency-update workflow:
1. Update package.json with new dependency versions.
2. Update pnpm-lock.yaml (or equivalent lockfile).
3. Test the build for compatibility.
4. Commit both files together.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: package.json, pnpm-lock.yaml

