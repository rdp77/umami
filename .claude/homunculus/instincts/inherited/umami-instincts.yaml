# Umami Workflow Update Translations

## Action

Follow the update-translations workflow:
1. Edit or add the appropriate JSON file(s) in public/intl/messages or public/intl/country.
2. Commit the changes with a message referencing the language and purpose.
3. Optionally, repeat for multiple languages in separate commits.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~5x per month
- Files: public/intl/messages/*.json, public/intl/country/*.json

